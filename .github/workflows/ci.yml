name: CI Build Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-dial:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v1
      
    - name: Install ESP32 core
      run: |
        arduino-cli core update-index --additional-urls https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json
        arduino-cli core install m5stack:esp32 --additional-urls https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json
        
    - name: Copy shared constants
      run: |
        cp shared/const.h Dial/const.h
        cp shared/const.h Stamp1/const.h  
        cp shared/const.h Stamp2/const.h
        
    - name: Verify constants consistency
      run: |
        echo "Checking const.h consistency..."
        md5sum Dial/const.h Stamp1/const.h Stamp2/const.h | uniq -c | grep -q "3 " || (echo "ERROR: const.h files are not identical!" && exit 1)
        echo "✅ All const.h files are identical"
        
    - name: Build Dial firmware
      run: |
        cd Dial
        arduino-cli compile --fqbn m5stack:esp32:m5stack_dial --additional-urls https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json .
        
    - name: Build Stamp1 firmware
      run: |
        cd Stamp1
        arduino-cli compile --fqbn m5stack:esp32:m5stack_stamp_s3 --additional-urls https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json .
        
    - name: Build Stamp2 firmware
      run: |
        cd Stamp2
        arduino-cli compile --fqbn m5stack:esp32:m5stack_stamp_s3 --additional-urls https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json .

  lint-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Check Arduino code style
      run: |
        echo "Checking code style..."
        # Basic Arduino style checks
        find . -name "*.ino" -o -name "*.h" -o -name "*.cpp" | xargs grep -l "using namespace std" && echo "WARNING: using namespace std found" || true
        find . -name "*.ino" -o -name "*.h" -o -name "*.cpp" | xargs grep -l "TODO\|FIXME\|XXX" && echo "INFO: TODO items found" || true
        
    - name: Check for common issues
      run: |
        echo "Checking for common Arduino issues..."
        # Check for proper includes
        find . -name "*.ino" | xargs grep -q "#include.*const.h" || (echo "ERROR: const.h not included in some .ino files!" && exit 1)
        echo "✅ All .ino files include const.h"

  constants-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Validate constants file
      run: |
        echo "Validating shared/const.h..."
        
        # Check for required definitions
        required_defs=("BAUD_RATE" "LED_COUNT" "DEFAULT_BEAT" "DEFAULT_WAVE" "CMD_KEY_DOWN" "CMD_SET_BEAT" "CMD_SET_WAVE" "CMD_SET_BPM")
        
        for def in "${required_defs[@]}"; do
          if grep -q "#define $def" shared/const.h; then
            echo "✅ Found $def"
          else
            echo "❌ Missing $def in shared/const.h"
            exit 1
          fi
        done
        
        # Check for required enums
        if grep -q "enum WaveType" shared/const.h; then
          echo "✅ WaveType enum found"
        else
          echo "❌ WaveType enum missing"
          exit 1
        fi
        
        # Check for required structures
        if grep -q "struct LedParam" shared/const.h; then
          echo "✅ LedParam struct found"
        else
          echo "❌ LedParam struct missing"
          exit 1
        fi
        
        echo "✅ Constants validation passed"